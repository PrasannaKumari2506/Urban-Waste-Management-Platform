{% extends 'base.html' %}

{% block extra_head %}
<script src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY|default:'' }}&libraries=places"></script>
{% endblock %}

{% block content %}
<div class="min-h-screen bg-sand py-12 px-4">
    <div class="max-w-3xl mx-auto">
        <div class="mb-6">
            <a href="{% url 'households:dashboard' %}" class="text-forest font-bold hover:text-forest-dark" data-testid="back-to-dashboard-link">← Back to Dashboard</a>
        </div>

        <div class="bg-white rounded-xl border border-charcoal/5 p-8">
            <h1 class="text-4xl font-heading font-extrabold text-charcoal mb-6 tracking-tighter" data-testid="request-pickup-heading">Request Waste Pickup</h1>

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Waste Type</label>
                    <select name="waste_category" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" data-testid="waste-category-select">
                        <option value="">Select waste type</option>
                        {% for category in waste_categories %}
                        <option value="{{ category.id }}">{{ category.name }} - {{ category.description }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Description (Optional)</label>
                    <textarea name="description" rows="3" class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" placeholder="Additional details about your waste..." data-testid="description-textarea"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Pickup Date</label>
                        <input type="date" name="pickup_date" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" data-testid="pickup-date-input">
                    </div>

                    <div>
                        <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Pickup Time</label>
                        <input type="time" name="pickup_time" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" data-testid="pickup-time-input">
                    </div>
                </div>

                <div>
                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Pickup Address</label>
                    <textarea name="address" rows="2" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" placeholder="Enter your pickup address..." data-testid="address-textarea">{{ user.address }}</textarea>
                </div>


                <div class="flex space-x-4">
                    <button type="submit" class="flex-1 bg-forest text-white font-bold py-3 rounded-lg hover:bg-forest-dark transition-all duration-200 transform hover:-translate-y-0.5" data-testid="submit-pickup-request-btn">Submit Request</button>
                    <a href="{% url 'households:dashboard' %}" class="flex-1 text-center bg-charcoal/5 text-charcoal font-bold py-3 rounded-lg hover:bg-charcoal/10 transition-all duration-200" data-testid="cancel-pickup-request-btn">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
