{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="absolute inset-0 z-0">
        <img src="{% static 'images/hero.png' %}" alt="Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/50"></div>
    </div>
    
    <div class="relative z-10 w-full max-w-md">
        <div class="bg-white rounded-xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-heading font-extrabold text-forest mb-2 tracking-tighter">Welcome Back</h1>
                <p class="text-charcoal/60">Sign in to continue to EcoWaste</p>
            </div>

            <div class="space-y-4">
                            <form method="post" class="space-y-6">
                                {% csrf_token %}
                                
                                <div>
                                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Email</label>
                                    <input type="email" name="email" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" placeholder="your@email.com" data-testid="login-email-input">
                                </div>

                                <div>
                                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Password</label>
                                    <input type="password" name="password" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" placeholder="••••••••" data-testid="login-password-input">
                                </div>

                                <button type="submit" class="w-full bg-forest text-white font-bold py-3 rounded-lg hover:bg-forest-dark transition-all duration-200 transform hover:-translate-y-0.5" data-testid="login-submit-btn">Sign In</button>
                            </form>

            </div>

            <div class="mt-6 text-center">
                <p class="text-sm text-charcoal/60">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-forest font-bold hover:text-forest-dark" data-testid="login-register-link">Register here</a></p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
