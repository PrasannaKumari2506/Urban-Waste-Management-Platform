{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="absolute inset-0 z-0">
        <img src="{% static 'images/hero.png' %}" alt="Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/50"></div>
    </div>
    
    <div class="relative z-10 w-full max-w-md">
        <div class="bg-white rounded-xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-heading font-extrabold text-forest mb-2 tracking-tighter">Join EcoWaste</h1>
                <p class="text-charcoal/60">Start your sustainable journey today</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Full Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" placeholder="John Doe" data-testid="register-name-input">
                </div>

                <div>
                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" placeholder="john@example.com" data-testid="register-email-input">
                </div>

                <div>
                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" placeholder="••••••••" data-testid="register-password-input">
                </div>

                <div>
                    <label class="block text-xs tracking-[0.2em] uppercase font-bold text-forest mb-2">I am a</label>
                    <select name="role" class="w-full px-4 py-3 bg-white border border-charcoal/10 rounded-lg focus:border-forest focus:ring-1 focus:ring-forest/30 transition-all" data-testid="register-role-select">
                        <option value="household">Household User</option>
                        <option value="recycler">Recycler / Waste Collector</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-forest text-white font-bold py-3 rounded-lg hover:bg-forest-dark transition-all duration-200 transform hover:-translate-y-0.5" data-testid="register-submit-btn">Create Account</button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-charcoal/60">Already have an account? <a href="{% url 'accounts:login' %}" class="text-forest font-bold hover:text-forest-dark" data-testid="register-login-link">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
